<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題集制作エディタ</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --primary:#4f46e5;
  --primary2:#4338ca;
  --good:#16a34a;
  --bad:#dc2626;
  --border:#dbe4ff;
  --bar-bg:#e2e8f0;
  --edit-bg:#fff8e6;
  --edit-border:orange;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f172a;
    --card:#111827;
    --text:#f8fafc;
    --sub:#94a3b8;
    --border:#334155;
    --bar-bg:#334155;
    --edit-bg:#2c2001;
    --edit-border:#b45309;
  }
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:24px;
}

h2{
  font-size:20px;
  margin-top:0;
  margin-bottom:16px;
  font-weight:bold;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
}

label {
  display: block;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
  color: var(--sub);
}

input[type="text"], textarea, select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid var(--border);
  font-size: 16px;
  background: var(--card);
  color: var(--text);
  margin-bottom: 16px;
  font-family: inherit;
}

input[type="text"]:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--primary);
}

button{
  border:none;
  border-radius:12px;
  padding:12px 20px;
  font-size:16px;
  cursor:pointer;
  transition: opacity 0.2s;
  font-weight: bold;
}

button:hover { opacity: 0.9; }

.primary{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
}

.success{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.danger{
  background:#dc2626;
  color:white;
}

.gray{
  background:transparent;
  border:2px solid var(--sub);
  color:var(--sub);
}

.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.question-item{
  border:1px solid var(--border);
  background: rgba(99,102,241,0.02);
  padding:16px;
  border-radius:16px;
  margin-top:12px;
  position: relative;
}

.question-item.editing{
  border:2px solid var(--edit-border);
  background:var(--edit-bg);
}

.q-meta {
  font-size: 13px;
  color: var(--sub);
  margin-bottom: 6px;
}

.q-text {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
  word-break: break-all;
}

.q-ans {
  font-size: 15px;
  color: var(--good);
  font-weight: bold;
}

.item-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: flex-end;
}

.item-actions button {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 8px;
}

.status-msg {
  font-weight: bold;
  margin-left: 10px;
  align-self: center;
}

/* 教科設定エリアのスタイル補正 */
.subject-setup-group {
  background: rgba(99,102,241,0.02);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

@media(max-width:640px){
  body{ padding: 10px; }
  .card{ padding: 16px; }
  button { width: 100%; }
  .item-actions button { width: auto; flex: 1; }
}
</style>
</head>
<body>

<div class="container">

<h1>問題集制作エディタ (クラウド管理版)</h1>

<div class="card">
  <h2>既存の問題集を編集する</h2>
  <label for="quizSelect">クラウド上の問題集を選択</label>
  <div style="display: flex; gap: 10px; margin-bottom: 4px;">
    <select id="quizSelect" style="margin-bottom:0;">
      <option value="">-- クラウドから読込中、または問題集がありません --</option>
    </select>
    <button class="primary" id="cloudLoadBtn" style="white-space: nowrap;">📂 読み込む</button>
  </div>
</div>

<div class="card">
  <h2>問題集の設定・保存・削除</h2>
  
  <div class="subject-setup-group">
    <label for="subjectSelect">教科（大枠のグループ）</label>
    <select id="subjectSelect">
      <option value="">-- 読込中 --</option>
    </select>

    <div id="newSubjectContainer" style="display: none; margin-top: 10px;">
      <label for="newSubjectInput" style="color: var(--primary);">✨ 新しい教科名を入力</label>
      <input type="text" id="newSubjectInput" placeholder="例: 歴史、理科、基本情報技術者 など" style="margin-bottom: 0;">
    </div>
  </div>
  
  <label for="quizTitle">問題集のタイトル（選択メニューにこの名前が並びます）</label>
  <input type="text" id="quizTitle" placeholder="例: 日本地理マスタークイズ">

  <div class="button-row">
    <button class="success" id="cloudSaveBtn">☁️ クラウドに保存（新規作成 / 上書き）</button>
    <button class="danger" id="cloudDeleteBtn" style="display: none;">🗑️ クラウドからこの問題集を削除</button>
    <span id="statusMsg" class="status-msg"></span>
  </div>
</div>

<div class="card">
  <h2 id="formTitle">問題の新規作成</h2>
  
  <label for="unitInput">単元名・カテゴリ</label>
  <input type="text" id="unitInput" placeholder="例: 第1章 基礎知識 / 日本史・江戸時代">

  <label for="questionInput">問題文</label>
  <textarea id="questionInput" rows="3" placeholder="ここに問題文を入力してください"></textarea>
  
  <label for="answerInput">正解の単語</label>
  <input type="text" id="answerInput" placeholder="ここに答えを入力してください">

  <div class="button-row">
    <button id="mainBtn" class="primary">問題を追加</button>
    <button id="cancelBtn" class="gray" style="display:none;">キャンセル</button>
  </div>
</div>

<div class="card">
  <h2>問題一覧 (<span id="qCount">0</span>問)</h2>
  <div id="list"></div>
</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCV2acb2e09L-2iedCJPJtEpsoN8i8L4v0",
    authDomain: "quiz-maker-6259f.firebaseapp.com",
    projectId: "quiz-maker-6259f",
    storageBucket: "quiz-maker-6259f.firebasestorage.app",
    messagingSenderId: "671224317335",
    appId: "1:671224317335:web:24baa4a56291ea19a630d2",
    measurementId: "G-0Q8ZKMS07B"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let questions = [];
  let editIndex = null;
  let currentLoadedDocId = null; 
  let globalSubjects = []; // クラウド上に存在する全教科のリスト

  // イベント設定
  document.getElementById("mainBtn").onclick = handleMain;
  document.getElementById("cancelBtn").onclick = cancelEdit;
  document.getElementById("cloudSaveBtn").onclick = saveToFirebase;
  document.getElementById("cloudLoadBtn").onclick = loadFromFirebase;
  document.getElementById("cloudDeleteBtn").onclick = deleteFromFirebase;
  
  // 教科のセレクトボックス変更時の連動
  document.getElementById("subjectSelect").onchange = (e) => {
    const container = document.getElementById("newSubjectContainer");
    if (e.target.value === "__NEW__") {
      container.style.display = "block";
      document.getElementById("newSubjectInput").focus();
    } else {
      container.style.display = "none";
    }
  };

  window.addEventListener("DOMContentLoaded", async () => {
    await refreshQuizList();
  });

  // 問題集のドロップダウンおよび「教科リスト」をまとめて更新
  async function refreshQuizList() {
    const select = document.getElementById("quizSelect");
    const subSelect = document.getElementById("subjectSelect");
    
    select.innerHTML = '<option value="">⏳ 読み込み中...</option>';
    subSelect.innerHTML = '<option value="">⏳ 読み込み中...</option>';
    
    try {
      const querySnapshot = await getDocs(collection(db, "quizzes"));
      select.innerHTML = '';
      
      const subjectSet = new Set();

      if(querySnapshot.empty) {
        select.innerHTML = '<option value="">クラウド上に問題集がありません</option>';
        document.getElementById("cloudDeleteBtn").style.display = "none";
        buildSubjectSelect(subjectSet, null);
        return;
      }

      const defaultOpt = document.createElement("option");
      defaultOpt.value = "";
      defaultOpt.textContent = "-- 編集する問題集を選択してください --";
      select.appendChild(defaultOpt);

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        
        // 存在する教科を収集
        if (data.subject) {
          subjectSet.add(data.subject.trim());
        }

        const opt = document.createElement("option");
        opt.value = doc.id; 
        opt.textContent = data.title || "無題の問題集";
        if(currentLoadedDocId === doc.id) opt.selected = true; 
        select.appendChild(opt);
      });

      globalSubjects = Array.from(subjectSet);
      
      // 現在ロードされている問題集の教科、あるいは選択されていた教科を維持
      const currentSelectedSub = subSelect.value;
      buildSubjectSelect(subjectSet, currentSelectedSub);

    } catch(err) {
      console.error(err);
      select.innerHTML = '<option value="">❌ リストの一覧取得に失敗しました</option>';
      subSelect.innerHTML = '<option value="">❌ 取得失敗</option>';
    }
  }

  // 教科セレクトボックスを生成するヘルパー
  function buildSubjectSelect(subjectSet, activeSubject) {
    const subSelect = document.getElementById("subjectSelect");
    const previousValue = subSelect.value;
    subSelect.innerHTML = "";

    const defaultSubOpt = document.createElement("option");
    defaultSubOpt.value = "";
    defaultSubOpt.textContent = "-- 教科を選択してください (必須) --";
    subSelect.appendChild(defaultSubOpt);

    subjectSet.forEach(sub => {
      const opt = document.createElement("option");
      opt.value = sub;
      opt.textContent = sub;
      if (sub === activeSubject) opt.selected = true;
      subSelect.appendChild(opt);
    });

    const newSubOpt = document.createElement("option");
    newSubOpt.value = "__NEW__";
    newSubOpt.textContent = "➕ 新しい教科を入力する...";
    if (activeSubject === "__NEW__" || (previousValue === "__NEW__" && !activeSubject)) {
      newSubOpt.selected = true;
    }
    subSelect.appendChild(newSubOpt);

    // 表示切り替えトリガーを叩く
    subSelect.dispatchEvent(new Event('change'));
  }

  function handleMain(){
    if(editIndex===null){
      addQuestion();
    }else{
      updateQuestion();
    }
  }

  function addQuestion(){
    const q = document.getElementById("questionInput").value.trim();
    const a = document.getElementById("answerInput").value.trim();
    const u = document.getElementById("unitInput").value.trim() || "共通単元";
    
    if(!q || !a){ 
      alert("問題文と正解は必ず入力してください"); 
      return; 
    }

    questions.push({
      question: q,
      answer: a,
      unit: u,
      stats: { correct: 0, wrong: 0 },
      statsHistory: []
    });
    
    render();
    clearForm();
  }

  window.editQuestion = function(i) {
    editIndex=i;
    document.getElementById("formTitle").textContent = "⚙️ 問題の編集（変更中）";
    document.getElementById("questionInput").value = questions[i].question;
    document.getElementById("answerInput").value = questions[i].answer;
    document.getElementById("unitInput").value = questions[i].unit || "";
    
    document.getElementById("mainBtn").textContent = "変更を確定する";
    document.getElementById("cancelBtn").style.display = "inline-block";
    render();
    document.getElementById("formTitle").scrollIntoView({ behavior: 'smooth' });
  }

  function updateQuestion(){
    const q = document.getElementById("questionInput").value.trim();
    const a = document.getElementById("answerInput").value.trim();
    const u = document.getElementById("unitInput").value.trim() || "共通単元";
    
    if(!q || !a){ 
      alert("問題文と正解は必ず入力してください"); 
      return; 
    }

    questions[editIndex].question = q;
    questions[editIndex].answer = a;
    questions[editIndex].unit = u;

    editIndex=null;
    document.getElementById("formTitle").textContent = "問題の新規作成";
    document.getElementById("mainBtn").textContent = "問題を追加";
    document.getElementById("cancelBtn").style.display = "none";
    render();
    clearForm();
  }

  function cancelEdit(){
    editIndex=null;
    document.getElementById("formTitle").textContent = "問題の新規作成";
    document.getElementById("mainBtn").textContent = "問題を追加";
    document.getElementById("cancelBtn").style.display = "none";
    clearForm();
    render();
  }

  window.deleteQuestion = function(i) {
    if(confirm("この問題を削除してもよろしいですか？")){
      questions.splice(i,1);
      if(editIndex === i) cancelEdit();
      else if(editIndex > i) editIndex--;
      render();
    }
  }

  function render(){
    const list = document.getElementById("list");
    list.innerHTML="";
    document.getElementById("qCount").textContent = questions.length;

    if(questions.length === 0) {
      list.innerHTML = `<div style="text-align:center; color:var(--sub); padding:20px;">問題がありません。上のフォームから追加してください。</div>`;
      return;
    }

    questions.forEach((q,i)=>{
      const div=document.createElement("div");
      div.className="question-item";
      if(i===editIndex) div.classList.add("editing");

      div.innerHTML=`
        <div class="q-meta">#${i+1} 【単元: ${q.unit || '共通単元'}】</div>
        <div class="q-text">${escapeHtml(q.question)}</div>
        <div class="q-ans">正解: ${escapeHtml(q.answer)}</div>
        <div class="item-actions">
          <button class="primary" onclick="editQuestion(${i})">編集</button>
          <button class="danger" onclick="deleteQuestion(${i})">削除</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function clearForm(){
    document.getElementById("questionInput").value="";
    document.getElementById("answerInput").value="";
  }

  /* =========================================
     Firebase 保存・読込・削除ロジック
     ========================================= */
  async function saveToFirebase() {
    const title = document.getElementById("quizTitle").value.trim();
    const subSelect = document.getElementById("subjectSelect");
    const msgEl = document.getElementById("statusMsg");

    // 教科の決定ロジック
    let subject = "";
    if (subSelect.value === "__NEW__") {
      subject = document.getElementById("newSubjectInput").value.trim();
    } else {
      subject = subSelect.value.trim();
    }

    if(!subject) {
      alert("教科を選択するか、新しい教科名を入力してください。");
      return;
    }

    if(!title) {
      alert("問題集のタイトルを入力してください");
      return;
    }

    msgEl.textContent = "⏳ 保存中...";
    msgEl.style.color = "var(--sub)";

    try {
      const docId = currentLoadedDocId || "quiz_" + Date.now();

      // ロード済みの古いデータがある場合は既存のログ（解答履歴）を破壊しないよう、
      // 事前に最新状態を取得してマージ、あるいは元データを引き継ぐ設計
      let existingLogs = {};
      if (currentLoadedDocId) {
        const snap = await getDoc(doc(db, "quizzes", currentLoadedDocId));
        if (snap.exists()) {
          existingLogs = snap.data().logs || {};
        }
      }

      await setDoc(doc(db, "quizzes", docId), {
        title: title,
        subject: subject,
        questions: questions,
        logs: existingLogs // 履歴データを保持
      });

      currentLoadedDocId = docId;
      msgEl.textContent = "✅ クラウド保存完了！";
      msgEl.style.color = "var(--good)";
      
      document.getElementById("newSubjectInput").value = "";
      document.getElementById("cloudDeleteBtn").style.display = "inline-block";
      
      // 更新後にリストと教科一覧を再構築（保存した教科が選択状態を維持するように引き渡す）
      await refreshQuizList();
      document.getElementById("subjectSelect").value = subject;
      document.getElementById("subjectSelect").dispatchEvent(new Event('change'));

    } catch (error) {
      console.error(error);
      msgEl.textContent = "❌ 保存失敗。";
      msgEl.style.color = "var(--bad)";
    }
  }

  async function loadFromFirebase() {
    const docId = document.getElementById("quizSelect").value;
    if(!docId) {
      alert("読み込みたい問題集をメニューから選択してください");
      return;
    }

    try {
      const docSnap = await getDoc(doc(db, "quizzes", docId));

      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("quizTitle").value = data.title || "";
        currentLoadedDocId = docId; 

        // 教科データの流し込み
        const targetSubject = data.subject || "その他";
        
        // 教科リスト（Set）に読み込んだ教科が存在しない場合は強制追加して再構築
        const subjectSet = new Set(globalSubjects);
        subjectSet.add(targetSubject);
        buildSubjectSelect(subjectSet, targetSubject);

        document.getElementById("cloudDeleteBtn").style.display = "inline-block";

        questions = data.questions || [];
        questions.forEach(q => {
          if(!q.unit) q.unit = q.status || "共通単元";
          if(!q.stats) q.stats = { correct: 0, wrong: 0 };
          if(!q.statsHistory) q.statsHistory = [];
        });

        editIndex = null;
        cancelEdit();
        render();
        document.getElementById("statusMsg").textContent = "";
        alert(`📂 「${data.title}」をロードしました（教科: ${targetSubject} / 全 ${questions.length} 問）`);
      }
    } catch (error) {
      console.error(error);
      alert("❌ データの読み込みに失敗しました。");
    }
  }

  async function deleteFromFirebase() {
    if(!currentLoadedDocId) return;

    const title = document.getElementById("quizTitle").value;
    if(!confirm(`⚠️ 本当に問題集「${title}」をクラウドから完全に削除しますか？\nこの操作は取り消せません。`)) {
      return;
    }

    const msgEl = document.getElementById("statusMsg");
    msgEl.textContent = "⏳ 削除中...";
    msgEl.style.color = "var(--sub)";

    try {
      await deleteDoc(doc(db, "quizzes", currentLoadedDocId));

      msgEl.textContent = "🗑️ 削除が完了しました";
      msgEl.style.color = "var(--bad)";

      currentLoadedDocId = null;
      questions = [];
      document.getElementById("quizTitle").value = "";
      document.getElementById("cloudDeleteBtn").style.display = "none";
      document.getElementById("newSubjectInput").value = "";
      
      cancelEdit();
      render();
      await refreshQuizList();
    } catch(error) {
      console.error(error);
      alert("❌ クラウドからの削除に失敗しました。");
      msgEl.textContent = "";
    }
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
</script>

</body>
</html>
