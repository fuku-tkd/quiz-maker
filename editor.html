<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問題集制作エディタ</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --primary:#4f46e5;
  --primary2:#4338ca;
  --good:#16a34a;
  --bad:#dc2626;
  --border:#dbe4ff;
  --bar-bg:#e2e8f0;
  --edit-bg:#fff8e6;
  --edit-border:orange;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f172a;
    --card:#111827;
    --text:#f8fafc;
    --sub:#94a3b8;
    --border:#334155;
    --bar-bg:#334155;
    --edit-bg:#2c2001;
    --edit-border:#b45309;
  }
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:24px;
}

h2{
  font-size:20px;
  margin-top:0;
  margin-bottom:16px;
  font-weight:bold;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
}

label {
  display: block;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 6px;
  color: var(--sub);
}

input[type="text"], textarea {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid var(--border);
  font-size: 16px;
  background: var(--card);
  color: var(--text);
  margin-bottom: 16px;
  font-family: inherit;
}

input[type="text"]:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
}

button{
  border:none;
  border-radius:12px;
  padding:12px 20px;
  font-size:16px;
  cursor:pointer;
  transition: opacity 0.2s;
  font-weight: bold;
}

button:hover { opacity: 0.9; }

.primary{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
}

.success{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.danger{
  background:#dc2626;
  color:white;
}

.gray{
  background:transparent;
  border:2px solid var(--sub);
  color:var(--sub);
}

.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.question-item{
  border:1px solid var(--border);
  background: rgba(99,102,241,0.02);
  padding:16px;
  border-radius:16px;
  margin-top:12px;
  position: relative;
}

.question-item.editing{
  border:2px solid var(--edit-border);
  background:var(--edit-bg);
}

.q-meta {
  font-size: 13px;
  color: var(--sub);
  margin-bottom: 6px;
}

.q-text {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
  word-break: break-all;
}

.q-ans {
  font-size: 15px;
  color: var(--good);
  font-weight: bold;
}

.item-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: flex-end;
}

.item-actions button {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 8px;
}

.status-msg {
  font-weight: bold;
  margin-left: 10px;
  align-self: center;
}

@media(max-width:640px){
  body{ padding: 10px; }
  .card{ padding: 16px; }
  button { width: 100%; }
  .item-actions button { width: auto; flex: 1; }
}
</style>
</head>
<body>

<div class="container">

<h1>問題集制作エディタ (Firebase版)</h1>

<div class="card">
  <h2>クラウドから問題集を読み込む</h2>
  <label for="loadQuizId">読込用 問題集ID (半角英数字)</label>
  <div style="display: flex; gap: 10px; margin-bottom: 16px;">
    <input type="text" id="loadQuizId" placeholder="例: geography01" style="margin-bottom:0;">
    <button class="primary" id="cloudLoadBtn" style="white-space: nowrap;">☁️ 読み込む</button>
  </div>
  <div style="font-size: 13px; color: var(--sub);">※データベースに既に存在するIDを入力すると、その続きから編集できます。</div>
</div>

<div class="card">
  <h2>問題集の設定・保存</h2>
  
  <label for="quizTitle">問題集の表示タイトル</label>
  <input type="text" id="quizTitle" placeholder="例: 日本地理クイズ">

  <label for="saveQuizId">保存用 問題集ID (半角英数字・一度決めたら変更不可)</label>
  <input type="text" id="saveQuizId" placeholder="例: geography01 (解答側でこのIDを入力して呼び出します)">
  
  <div class="button-row">
    <button class="success" id="cloudSaveBtn">☁️ クラウドに保存（新規・上書き）</button>
    <span id="statusMsg" class="status-msg"></span>
  </div>
</div>

<div class="card">
  <h2 id="formTitle">問題の新規作成</h2>
  
  <label for="unitInput">単元名・カテゴリ</label>
  <input type="text" id="unitInput" placeholder="例: 第1章 基礎知識 / 日本史・江戸時代">

  <label for="questionInput">問題文</label>
  <textarea id="questionInput" rows="3" placeholder="ここに問題文を入力してください"></textarea>
  
  <label for="answerInput">正解の単語</label>
  <input type="text" id="answerInput" placeholder="ここに答えを入力してください">

  <div class="button-row">
    <button id="mainBtn" class="primary">問題を追加</button>
    <button id="cancelBtn" class="gray" style="display:none;">キャンセル</button>
  </div>
</div>

<div class="card">
  <h2>問題一覧 (<span id="qCount">0</span>問)</h2>
  <div id="list"></div>
</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // 取得したFirebaseのConfig情報
  const firebaseConfig = {
    apiKey: "AIzaSyCV2acb2e09L-2iedCJPJtEpsoN8i8L4v0",
    authDomain: "quiz-maker-6259f.firebaseapp.com",
    projectId: "quiz-maker-6259f",
    storageBucket: "quiz-maker-6259f.firebasestorage.app",
    messagingSenderId: "671224317335",
    appId: "1:671224317335:web:24baa4a56291ea19a630d2",
    measurementId: "G-0Q8ZKMS07B"
  };

  // Firebase初期化
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // グローバル変数
  let questions = [];
  let editIndex = null;

  // DOM要素のバインドとイベント登録
  document.getElementById("mainBtn").onclick = handleMain;
  document.getElementById("cancelBtn").onclick = cancelEdit;
  document.getElementById("cloudSaveBtn").onclick = saveToFirebase;
  document.getElementById("cloudLoadBtn").onclick = loadFromFirebase;

  function handleMain(){
    if(editIndex===null){
      addQuestion();
    }else{
      updateQuestion();
    }
  }

  function addQuestion(){
    const q = document.getElementById("questionInput").value.trim();
    const a = document.getElementById("answerInput").value.trim();
    const u = document.getElementById("unitInput").value.trim() || "共通単元";
    
    if(!q || !a){ 
      alert("問題文と正解は必ず入力してください"); 
      return; 
    }

    questions.push({
      question: q,
      answer: a,
      unit: u,
      stats: { correct: 0, wrong: 0 },
      statsHistory: []
    });
    
    render();
    clearForm();
  }

  window.editQuestion = function(i) { // HTML内のonclickから呼ぶためwindowにバインド
    editIndex=i;
    document.getElementById("formTitle").textContent = "⚙️ 問題の編集（変更中）";
    document.getElementById("questionInput").value = questions[i].question;
    document.getElementById("answerInput").value = questions[i].answer;
    document.getElementById("unitInput").value = questions[i].unit || "";
    
    document.getElementById("mainBtn").textContent = "変更を確定する";
    document.getElementById("cancelBtn").style.display = "inline-block";
    render();
    document.getElementById("formTitle").scrollIntoView({ behavior: 'smooth' });
  }

  function updateQuestion(){
    const q = document.getElementById("questionInput").value.trim();
    const a = document.getElementById("answerInput").value.trim();
    const u = document.getElementById("unitInput").value.trim() || "共通単元";
    
    if(!q || !a){ 
      alert("問題文と正解は必ず入力してください"); 
      return; 
    }

    questions[editIndex].question = q;
    questions[editIndex].answer = a;
    questions[editIndex].unit = u;

    editIndex=null;
    document.getElementById("formTitle").textContent = "問題の新規作成";
    document.getElementById("mainBtn").textContent = "問題を追加";
    document.getElementById("cancelBtn").style.display = "none";
    render();
    clearForm();
  }

  function cancelEdit(){
    editIndex=null;
    document.getElementById("formTitle").textContent = "問題の新規作成";
    document.getElementById("mainBtn").textContent = "問題を追加";
    document.getElementById("cancelBtn").style.display = "none";
    clearForm();
    render();
  }

  window.deleteQuestion = function(i) {
    if(confirm("この問題を削除してもよろしいですか？")){
      questions.splice(i,1);
      if(editIndex === i) cancelEdit();
      else if(editIndex > i) editIndex--;
      render();
    }
  }

  function render(){
    const list = document.getElementById("list");
    list.innerHTML="";
    document.getElementById("qCount").textContent = questions.length;

    if(questions.length === 0) {
      list.innerHTML = `<div style="text-align:center; color:var(--sub); padding:20px;">問題がありません。上のフォームから追加してください。</div>`;
      return;
    }

    questions.forEach((q,i)=>{
      const div=document.createElement("div");
      div.className="question-item";
      if(i===editIndex) div.classList.add("editing");

      div.innerHTML=`
        <div class="q-meta">#${i+1} 【単元: ${q.unit || '共通単元'}】</div>
        <div class="q-text">${escapeHtml(q.question)}</div>
        <div class="q-ans">正解: ${escapeHtml(q.answer)}</div>
        <div class="item-actions">
          <button class="primary" onclick="editQuestion(${i})">編集</button>
          <button class="danger" onclick="deleteQuestion(${i})">削除</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function clearForm(){
    document.getElementById("questionInput").value="";
    document.getElementById("answerInput").value="";
  }

  /* =========================================
     Firebase (Firestore) 保存・読込ロジック
     ========================================= */
  async function saveToFirebase() {
    const title = document.getElementById("quizTitle").value.trim();
    const quizId = document.getElementById("saveQuizId").value.trim();
    const msgEl = document.getElementById("statusMsg");

    if(!title || !quizId) {
      alert("「表示タイトル」と「保存用問題集ID」を両方入力してください");
      return;
    }

    // IDの簡易バリデーション (半角英数字チェック)
    if(!/^[a-zA-Z0-9_-]+$/.test(quizId)) {
      alert("問題集IDは半角英数字、ハイフン、アンダースコアのみで入力してください");
      return;
    }

    msgEl.textContent = "⏳ 保存中...";
    msgEl.style.color = "var(--sub)";

    try {
      // Firestoreの 'quizzes' コレクションの 'quizId' ドキュメントに保存
      await setDoc(doc(db, "quizzes", quizId), {
        title: title,
        questions: questions
      });

      msgEl.textContent = "✅ クラウド保存完了！";
      msgEl.style.color = "var(--good)";
      
      // 読み込み欄にも自動セット
      document.getElementById("loadQuizId").value = quizId;
    } catch (error) {
      console.error("Error saving document: ", error);
      msgEl.textContent = "❌ 保存失敗。権限などを確認してください。";
      msgEl.style.color = "var(--bad)";
    }
  }

  async function loadFromFirebase() {
    const quizId = document.getElementById("loadQuizId").value.trim();
    if(!quizId) {
      alert("読み込みたい問題集IDを入力してください");
      return;
    }

    try {
      const docRef = doc(db, "quizzes", quizId);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("quizTitle").value = data.title || "";
        document.getElementById("saveQuizId").value = quizId;
        // 編集ロック用にID変更不可にする場合はここを有効に
        document.getElementById("saveQuizId").disabled = true;

        questions = data.questions || [];
        // 過去のstats保持の互換性チェック
        questions.forEach(q => {
          if(!q.unit) q.unit = q.status || "共通単元";
          if(!q.stats) q.stats = { correct: 0, wrong: 0 };
          if(!q.statsHistory) q.statsHistory = [];
        });

        editIndex = null;
        cancelEdit();
        render();
        alert(`📂 問題集「${data.title}」をロードしました（全 ${questions.length} 問）`);
      } else {
        alert("⚠️ 指定されたIDの問題集は見つかりませんでした。");
      }
    } catch (error) {
      console.error("Error loading document: ", error);
      alert("❌ データの読み込みに失敗しました。");
    }
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
</script>

</body>
</html>
