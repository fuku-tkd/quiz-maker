<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精度重視・暗記学習ツール</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1e293b;
  --sub:#64748b;
  --primary:#4f46e5;
  --primary2:#4338ca;
  --good:#16a34a;
  --bad:#dc2626;
  --border:#dbe4ff;
  --bar-bg:#e2e8f0;
  
  --rank1:#f59e0b;
  --rank2:#84cc16;
  --rank3:#22c55e;
  --rank0:#cbd5e1;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f172a;
    --card:#111827;
    --text:#f8fafc;
    --border:#334155;
    --bar-bg:#334155;
    --rank0:#475569;
  }
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x: hidden;
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:24px;
}

h2{
  font-size:18px;
  margin:0;
  color:var(--sub);
  font-weight:bold;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:24px;
  margin-bottom:18px;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
  position: relative;
}

.quiz-select-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.quiz-select-body {
  max-height: 2000px;
  overflow: hidden;
  transition: max-height 0.3s ease-in-out;
  margin-top: 16px;
}
.card.collapsed .quiz-select-body {
  max-height: 0;
  margin-top: 0;
}

.subject-group {
  border: 1px solid var(--border);
  border-radius: 18px;
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--card);
  transition: border-color 0.2s, background-color 0.2s;
}

.subject-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: rgba(99,102,241,0.02);
  cursor: pointer;
  user-select: none;
  font-weight: bold;
  font-size: 16px;
}
.subject-header:hover {
  background: rgba(99,102,241,0.06);
}

.subject-title-left {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text); /* 文字色は常に通常のUIの黒（ダークモード時は白）に固定 */
}

.subject-count-tag {
  font-size: 12px;
  background: var(--border);
  color: var(--primary2);
  padding: 2px 8px;
  border-radius: 999px;
}

.subject-items-container {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-in-out;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 0;
}
.subject-group.open .subject-items-container {
  max-height: 1000px;
  padding: 12px;
  border-top: 1px solid var(--border);
}

.quiz-row-item {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.2s ease;
}

.quiz-row-item.active {
  border-color: var(--primary);
  background: rgba(99,102,241,0.02);
}

.quiz-row-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}

.quiz-row-header:hover {
  background: rgba(99,102,241,0.04);
}

.quiz-row-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-grow: 1;
}

.quiz-row-title-container {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.quiz-row-title {
  font-size: 16px;
  font-weight: bold;
  color: var(--text);
  word-break: break-all;
}

.quiz-row-meta {
  font-size: 12px;
  color: var(--sub);
}

.select-status-badge {
  background: var(--primary);
  color: white;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 8px;
  border-radius: 999px;
  display: none;
}
.quiz-row-item.active .select-status-badge {
  display: inline-block;
}

.toggle-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--sub);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
  transition: all 0.2s;
}
.toggle-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.shake {
  animation: shakeAnim 0.4s ease-in-out;
}
@keyframes shakeAnim {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}

input[type="text"], input[type="number"] {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: 2px solid var(--border);
  font-size: 20px;
  background: var(--card);
  color: var(--text);
  outline: none;
}
select:focus, input[type="text"]:focus, input[type="number"]:focus {
  border-color: var(--primary);
}

.select-grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top: 14px;
}

.select-btn{
  border:none;
  border-radius:14px;
  padding:12px 18px;
  cursor:pointer;
  background:#e5e7eb;
  color:#1e293b;
  font-size:16px;
  transition:.2s;
  font-weight: bold;
}

.select-btn.active{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
}

.unit-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 14px;
}

.unit-row-label {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(99,102,241,0.03);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: opacity 0.2s, background 0.2s;
}

.unit-row-label:hover {
  background: rgba(99,102,241,0.06);
}

.unit-row-label.disabled {
  opacity: 0.4;
}

.unit-row-label input[type="checkbox"] {
  width: 22px;
  height: 22px;
  cursor: pointer;
  accent-color: var(--primary);
  flex-shrink: 0;
}

.unit-info {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.unit-header-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 16px;
  font-weight: bold;
  color: var(--text); /* 単元名も文字色を固定 */
}

.unit-rate {
  font-size: 14px;
  color: var(--sub);
}

.bar-container{
  width:100%;
  height:10px;
  background:var(--bar-bg);
  border-radius:999px;
  overflow:hidden;
}
.bar{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  transition: width 0.3s ease;
}

.stacked-bar-container {
  display: flex;
  width: 100%;
  height: 24px;
  background: var(--bar-bg);
  border-radius: 12px;
  overflow: hidden;
  margin: 16px 0;
}
.stacked-segment {
  height: 100%;
  transition: width 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: bold;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

.legend-container {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 10px;
  font-size: 13px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-color {
  width: 14px;
  height: 14px;
  border-radius: 4px;
}

.main-btn, .sub-btn, .danger-sub-btn{
  border:none;
  border-radius:16px;
  padding:14px 20px;
  font-size:18px;
  cursor:pointer;
  font-weight: bold;
  transition: opacity 0.2s;
}

.main-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
}

.sub-btn{
  background:transparent;
  border:2px solid var(--primary);
  color:var(--primary);
}

.danger-sub-btn{
  background:transparent;
  border:2px solid #dc2626;
  color:#dc2626;
}

.button-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:18px;
}

.button-row.center{
  justify-content:center;
}

.question{
  text-align:center;
  font-size:52px;
  font-weight:800;
  margin:34px 0;
  word-break: break-all;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  background:#e0e7ff;
  color:#3730a3;
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
}

.progress{
  width:100%;
  height:16px;
  background:var(--bar-bg);
  border-radius:999px;
  overflow:hidden;
  margin:18px 0;
}

.progress-inner{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#16a34a);
  transition: width 0.2s;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
  margin-bottom: 20px;
}

.stat{
  background:rgba(99,102,241,.08);
  border-radius:18px;
  padding:16px;
}

.stat-value{
  font-size:30px;
  font-weight:bold;
  margin-top:8px;
}

.effect-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 150px; font-weight: bold;
  opacity: 0; pointer-events: none; z-index: 10;
}
.effect-overlay.animate-ok { animation: popUpOk 0.8s forwards ease-out; }
.effect-overlay.animate-ng { animation: popUpNg 0.8s forwards ease-out; }

@keyframes popUpOk {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  30% { transform: translate(-50%, -60%) scale(1.1); opacity: 0.8; }
  100% { transform: translate(-50%, -80%) scale(1); opacity: 0; }
}
@keyframes popUpNg {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}

.result-item{
  background:rgba(99,102,241,.05);
  border-radius:18px; padding:14px; margin-bottom:12px;
}

.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px; padding: 28px;
  width: 90%; max-width: 440px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transform: scale(0.9); transition: transform 0.2s ease;
  text-align: center;
}
.modal-overlay.active .modal-card { transform: scale(1); }
.modal-header { font-size: 22px; font-weight: bold; margin-bottom: 14px; }
.modal-body { font-size: 16px; color: var(--text); line-height: 1.6; margin-bottom: 22px; }

.good{color:var(--good);}
.bad{color:var(--bad);}

@media(max-width:640px){
  body{ padding: 10px; }
  h1{font-size:26px;}
  .question{font-size:36px;}
  .button-row>*{width:100%;}
}
</style>
</head>
<body>

<div class="container">

<h1>暗記学習システム</h1>

<div class="card" id="quizSelectCard">
  <div class="quiz-select-header" id="mainQuizToggleHeader">
    <h2>問題集を選択</h2>
    <button class="toggle-btn" id="mainQuizToggleBtn" title="問題集リストを開閉">∨</button>
  </div>
  <div class="quiz-select-body" id="mainQuizSelectBody">
    <div class="quiz-list-container" id="quizGrid">
      <div style="text-align: center; color: var(--sub); padding: 20px;">
        クラウドから問題集をロード中...
      </div>
    </div>
  </div>
</div>

<div id="app">
  <div class="card" style="text-align: center; color: var(--sub);">
    上のリストから問題集を選択すると、詳細設定が開きます。
  </div>
</div>

</div>

<div class="modal-overlay" id="customModal">
  <div class="modal-card">
    <div class="modal-header" id="modalTitle">システム通知</div>
    <div class="modal-body" id="modalBody">メッセージ</div>
    <div class="button-row center">
      <button class="main-btn" style="width: 100%;" id="modalCloseBtn">閉じる</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCV2acb2e09L-2iedCJPJtEpsoN8i8L4v0",
    authDomain: "quiz-maker-6259f.firebaseapp.com",
    projectId: "quiz-maker-6259f",
    storageBucket: "quiz-maker-6259f.firebasestorage.app",
    messagingSenderId: "671224317335",
    appId: "1:671224317335:web:24baa4a56291ea19a630d2",
    measurementId: "G-0Q8ZKMS07B"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let originalQuiz = null;   
  let quizDocId = null;      
  let quiz = null;           
  let index = 0;
  let score = 0;
  let streak = 0;
  let results = [];
  let misses = [];
  let nextTimer = null;

  let isMemorizeMode = false; 
  let sessionAnsweredCount = 0; 
  let memorizeSuccessLogs = {}; 

  const appArea = document.getElementById("app");
  const quizGrid = document.getElementById("quizGrid");
  const quizSelectCard = document.getElementById("quizSelectCard");
  const mainQuizToggleHeader = document.getElementById("mainQuizToggleHeader");
  const mainQuizToggleBtn = document.getElementById("mainQuizToggleBtn");

  document.getElementById("modalCloseBtn").onclick = hideModal;

  mainQuizToggleHeader.onclick = () => {
    const isCollapsed = quizSelectCard.classList.contains("collapsed");
    if (isCollapsed) {
      quizSelectCard.classList.remove("collapsed");
      mainQuizToggleBtn.textContent = "∨";
    } else {
      quizSelectCard.classList.add("collapsed");
      mainQuizToggleBtn.textContent = "^";
    }
  };

  window.addEventListener("DOMContentLoaded", fetchQuizList);

  function hexToRgba(hex, alpha) {
    if (!hex || !hex.startsWith('#')) return null;
    const c = hex.substring(1);
    const r = parseInt(c.substring(0, 2), 16);
    const g = parseInt(c.substring(2, 4), 16);
    const b = parseInt(c.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  async function fetchQuizList() {
    try {
      const querySnapshot = await getDocs(collection(db, "quizzes"));
      quizGrid.innerHTML = "";

      if(querySnapshot.empty) {
        quizGrid.innerHTML = '<div style="text-align: center; color: var(--sub); padding: 20px;">クラウドに問題集が登録されていません。</div>';
        return;
      }

      const subjectGroups = {};

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const subject = data.subject || "その他";
        
        if (!subjectGroups[subject]) {
          subjectGroups[subject] = {
            color: data.subjectColor || null, 
            quizzes: []
          };
        }
        if (data.subjectColor && !subjectGroups[subject].color) {
          subjectGroups[subject].color = data.subjectColor;
        }
        subjectGroups[subject].quizzes.push({ id: doc.id, ...data });
      });

      // 【修正】「その他」が必ず一番最後（下）に来るようにソート
      const sortedSubjectNames = Object.keys(subjectGroups).sort((a, b) => {
        if (a === "その他") return 1;
        if (b === "その他") return -1;
        return a.localeCompare(b, 'ja');
      });

      sortedSubjectNames.forEach((subName) => {
        const groupData = subjectGroups[subName];
        const quizList = groupData.quizzes;
        const baseColor = groupData.color; 

        const groupEl = document.createElement("div");
        groupEl.className = "subject-group";
        groupEl.id = `group_${subName}`;

        if (baseColor) {
          const bgSoft = hexToRgba(baseColor, 0.03);     
          const borderSoft = hexToRgba(baseColor, 0.25); 
          
          groupEl.style.borderColor = borderSoft;
          groupEl.style.backgroundColor = bgSoft;
        }

        // 【修正】「style="color: ${baseColor}"」を削除し、文字色はCSS標準（黒ベース）に固定
        groupEl.innerHTML = `
          <div class="subject-header" ${baseColor ? `style="background: ${hexToRgba(baseColor, 0.05)}"` : ''}>
            <div class="subject-title-left">
              <span>${escapeHtml(subName)}</span>
              <span class="subject-count-tag" ${baseColor ? `style="background: ${hexToRgba(baseColor, 0.12)}; color: var(--primary2);"` : ''}>${quizList.length}個の問題集</span>
            </div>
            <button class="toggle-btn sub-toggle-btn" ${baseColor ? `style="border-color: ${hexToRgba(baseColor, 0.3)}; color: var(--sub);"` : ''}>^</button>
          </div>
          <div class="subject-items-container"></div>
        `;

        const itemsContainer = groupEl.querySelector(".subject-items-container");
        const subToggleBtn = groupEl.querySelector(".sub-toggle-btn");

        if(baseColor) {
          itemsContainer.style.borderTopColor = hexToRgba(baseColor, 0.2);
        }

        groupEl.querySelector(".subject-header").onclick = () => {
          const isOpen = groupEl.classList.contains("open");
          if (isOpen) {
            groupEl.classList.remove("open");
            subToggleBtn.textContent = "^";
          } else {
            groupEl.classList.add("open");
            subToggleBtn.textContent = "∨";
          }
        };

        quizList.forEach((quizData) => {
          const questions = quizData.questions || [];
          const logs = quizData.logs || {};
          const qCount = questions.length;
          const title = quizData.title || "無題の問題集";

          let totalCorrect = 0;
          let totalCount = 0;

          questions.forEach((q, idx) => {
            const log = logs[idx];
            if(log) {
              const c = log.correct || 0;
              const w = log.wrong || 0;
              if((c + w) > 0) {
                totalCorrect += c;
                totalCount += (c + w);
              }
            }
          });

          const accuracy = totalCount === 0 ? 0 : Math.round((totalCorrect / totalCount) * 100);

          const rowItem = document.createElement("div");
          rowItem.className = "quiz-row-item";
          rowItem.id = `row_${quizData.id}`;
          
          if(baseColor) {
            rowItem.style.borderColor = hexToRgba(baseColor, 0.15);
          }

          if (quizDocId === quizData.id) {
            rowItem.classList.add("active");
            groupEl.classList.add("open");
            subToggleBtn.textContent = "∨";
            
            if(baseColor) {
              rowItem.style.borderColor = baseColor;
              rowItem.style.backgroundColor = hexToRgba(baseColor, 0.05);
            }
          }

          rowItem.innerHTML = `
            <div class="quiz-row-header">
              <div class="quiz-row-left">
                <div class="quiz-row-title-container">
                  <span class="quiz-row-title">${escapeHtml(title)}</span>
                  <span class="select-status-badge" ${baseColor ? `style="background: ${baseColor}"` : ''}>選択中</span>
                </div>
                <div class="quiz-row-meta">
                  収録数: ${qCount}問 | 解答履歴: ${totalCount}回 ${totalCount > 0 ? `(総合正答率: ${accuracy}%)` : '(未挑戦)'}
                </div>
              </div>
            </div>
          `;

          rowItem.onclick = (e) => {
            e.stopPropagation();
            selectQuiz(quizData.id);
            quizSelectCard.classList.add("collapsed");
            mainQuizToggleBtn.textContent = "^";
          };

          itemsContainer.appendChild(rowItem);
        });

        quizGrid.appendChild(groupEl);
      });

    } catch(err) {
      console.error(err);
      quizGrid.innerHTML = '<div style="text-align: center; color: var(--bad); padding: 20px;">問題集の一覧取得に失敗しました</div>';
    }
  }

  async function selectQuiz(id) {
    quizDocId = id;
    document.querySelectorAll(".quiz-row-item").forEach(el => {
      el.classList.remove("active");
      el.style.backgroundColor = "";
      el.style.borderColor = "";
    });
    
    await fetchQuizList();

    const activeRow = document.getElementById(`row_${id}`);
    const titleText = activeRow ? activeRow.querySelector('.quiz-row-title').textContent : "問題集";
    appArea.innerHTML = `<div class="card" style="text-align: center; color: var(--sub);">クラウドから「${titleText}」を読み込んでいます...</div>`;

    try {
      const docSnap = await getDoc(doc(db, "quizzes", quizDocId));
      if(docSnap.exists()) {
        originalQuiz = docSnap.data();
        if(!originalQuiz.questions) originalQuiz.questions = [];
        if(!originalQuiz.logs) originalQuiz.logs = {}; 
        
        originalQuiz.questions.forEach((q, idx) => {
          const log = originalQuiz.logs[idx] || { correct: 0, wrong: 0, history: [] };
          q.stats = { correct: log.correct || 0, wrong: log.wrong || 0 };
          q.statsHistory = log.history || [];
          if (!q.unit) q.unit = q.status || "共通単元";
        });

        showStart();
        appArea.scrollIntoView({ behavior: 'smooth' });
      }
    } catch(err) {
      console.error(err);
      appArea.innerHTML = `<div class="card" style="text-align: center; color: var(--bad);">データの同期に失敗しました。</div>`;
    }
  }

  function showStart(){
    clearTimeout(nextTimer);
    window.removeEventListener("keydown", handleEnterNext);
    quizSelectCard.style.display = "block";
    
    if(!originalQuiz) return;

    const baseColor = originalQuiz.subjectColor || null;

    const stats = {};
    originalQuiz.questions.forEach(q => {
      const unitName = q.unit || "共通単元";
      if (!stats[unitName]) stats[unitName] = { correct: 0, total: 0 };
      stats[unitName].correct += q.stats.correct;
      stats[unitName].total += (q.stats.correct + q.stats.wrong);
    });

    const uniqueCategories = [...new Set(originalQuiz.questions.map(q => q.unit || "共通単元"))];
    
    let unitListHTML = "";
    uniqueCategories.forEach(cat => {
      const s = stats[cat] || { correct: 0, total: 0 };
      const rate = s.total === 0 ? 0 : Math.round((s.correct / s.total) * 100);
      
      let customLabelStyle = "";
      let customBarStyle = "";
      if (baseColor) {

        customBarStyle = `style="background: linear-gradient(90deg, ${baseColor}, ${hexToRgba(baseColor, 0.8)})"`;
      }

      unitListHTML += `
        <label class="unit-row-label" id="label_${cat}" ${customLabelStyle}>
          <input type="checkbox" class="category-check" value="${cat}" checked ${baseColor ? `style="accent-color:${baseColor}"`:''}>
          <div class="unit-info">
            <div class="unit-header-meta">
              <span>${cat}</span>
              <span class="unit-rate">正答率: ${rate}%</span>
            </div>
            <div class="bar-container">
              <div class="bar" ${customBarStyle || `style="width:${rate}%"`} ${baseColor ? `data-rate="${rate}"` : `style="width:${rate}%"`}></div>
            </div>
          </div>
        </label>
      `;
    });

    appArea.innerHTML = `
      <div class="card">
        <h2>モード選択</h2>
        <div class="select-grid">
          <button class="select-btn active" data-mode="normal">テストモード（登録順）</button>
          <button class="select-btn" data-mode="random">テストモード（ランダム）</button>
          <button class="select-btn" data-mode="weak">苦手セレクト（正答率順）</button>
          <button class="select-btn" data-mode="memorize">確率変動・暗記モード</button>
        </div>
      </div>

      <div class="card">
        <h2>カテゴリ・単元選択</h2>
        <div class="unit-list">
          <label class="unit-row-label" style="background:transparent; border:none; padding:4px 0;">
            <input type="checkbox" id="checkAll" checked ${baseColor ? `style="accent-color:${baseColor}"`:''}>
            <div class="unit-info" style="font-weight:bold; color:var(--text);">すべて選択 / 解除</div>
          </label>
          <hr style="width:100%; border:0; border-top:1px dashed var(--border); margin:4px 0;">
          
          <div id="dynamicUnitContainer">${unitListHTML}</div>
          
          <label class="unit-row-label" id="label_miss" style="border: 1px dashed var(--bad); background: rgba(220,38,38,0.02);">
            <input type="checkbox" class="category-check" value="miss" style="accent-color: var(--bad)">
            <div class="unit-info" style="color: var(--bad); font-weight: bold;">
              通算ミス（不正解数）が正解より多い問題のみを強制抽出
            </div>
          </label>
        </div>
      </div>

      <div class="card" id="maxCountContainer">
        <h2>最大出題数</h2>
        <input type="number" id="count" placeholder="指定なし（全問出題）">
      </div>

      <div class="button-row center">
        <button class="main-btn" id="startQuizBtn" style="width: 100%; max-width: 300px; ${baseColor ? `background:linear-gradient(135deg, ${baseColor}, ${hexToRgba(baseColor,0.8)})` : ''}">スタート</button>
      </div>
    `;

    appArea.querySelectorAll(".bar[data-rate]").forEach(bar => {
      bar.style.width = bar.dataset.rate + "%";
    });

    appArea.querySelectorAll("[data-mode]").forEach(el=>{
      if (baseColor && el.classList.contains("active")) {
        el.style.background = baseColor;
        el.style.color = "#fff";
      }
      el.onclick=()=>{
        appArea.querySelectorAll("[data-mode]").forEach(e=>{
          e.classList.remove("active");
          e.style.background = "";
          e.style.color = "";
        });
        el.classList.add("active");
        if (baseColor) {
          el.style.background = baseColor;
          el.style.color = "#fff";
        }
        if(el.dataset.mode === "memorize") {
          document.getElementById("maxCountContainer").style.display = "none";
        } else {
          document.getElementById("maxCountContainer").style.display = "block";
        }
      };
    });

    const cbs = appArea.querySelectorAll(".category-check");
    cbs.forEach(cb => {
      cb.onchange = () => {
        const label = appArea.querySelector(`#label_${CSS.escape(cb.value)}`);
        if(label) cb.checked ? label.classList.remove('disabled') : label.classList.add('disabled');
      };
    });

    const checkAll = appArea.querySelector("#checkAll");
    checkAll.onchange = () => {
      cbs.forEach(cb => {
        cb.checked = checkAll.checked;
        const label = appArea.querySelector(`#label_${CSS.escape(cb.value)}`);
        if(label) checkAll.checked ? label.classList.remove('disabled') : label.classList.add('disabled');
      });
    };

    appArea.querySelector("#startQuizBtn").onclick = startQuiz;
  }

  function startQuiz(){
    score=0; streak=0; index=0; results=[]; misses=[];
    sessionAnsweredCount = 0;
    memorizeSuccessLogs = {}; 

    const mode = appArea.querySelector("[data-mode].active").dataset.mode;
    const checkedBoxes = appArea.querySelectorAll('.category-check:checked');
    const selectedStatuses = Array.from(checkedBoxes).map(cb => cb.value);

    if(selectedStatuses.length === 0) {
      openModal("エラー", "カテゴリを1つ以上選択してください。");
      return;
    }

    quizSelectCard.style.display = "none";

    let baseQuestions = [];
    const normalStatuses = selectedStatuses.filter(s => s !== "miss");
    
    originalQuiz.questions.forEach((q, originalIdx) => {
      if(normalStatuses.includes(q.unit)) {
        baseQuestions.push({ ...q, originalIdx: originalIdx });
      }
    });

    if(selectedStatuses.includes("miss")){
      originalQuiz.questions.forEach((mq, originalIdx) => {
        const isAlreadyAdded = baseQuestions.some(bq => bq.originalIdx === originalIdx);
        if(!isAlreadyAdded && (mq.stats.wrong > mq.stats.correct)){
          baseQuestions.push({ ...mq, originalIdx: originalIdx });
        }
      });
    }

    if(mode === "memorize") {
      isMemorizeMode = true;
      quiz = { questions: baseQuestions };
      quiz.questions.forEach(q => {
        memorizeSuccessLogs[q.originalIdx] = 0;
      });
      showMemorizeQuestion();
    } else {
      isMemorizeMode = false;
      const limit = parseInt(appArea.querySelector("#count").value);
      if(mode === "random"){
        for(let i = baseQuestions.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [baseQuestions[i], baseQuestions[j]] = [baseQuestions[j], baseQuestions[i]];
        }
      } else if(mode === "weak"){
        baseQuestions.sort((a,b)=>{
          const aHistory = a.statsHistory || [];
          const bHistory = b.statsHistory || [];
          const aCorrectRate = aHistory.length ? (aHistory.reduce((s,v)=>s+v,0)/aHistory.length) : 1;
          const bCorrectRate = bHistory.length ? (bHistory.reduce((s,v)=>s+v,0)/bHistory.length) : 1;
          if(aCorrectRate !== bCorrectRate) return aCorrectRate - bCorrectRate;
          return b.stats.wrong - a.stats.wrong;
        });
      }
      quiz = { questions: baseQuestions };
      if(!isNaN(limit) && limit > 0) quiz.questions = quiz.questions.slice(0, limit);

      if(quiz.questions.length === 0){
        openModal("お知らせ", "対象の問題が見つかりませんでした。");
        showStart(); return;
      }
      showQuestion();
    }
  }

  let currentMemorizeQuestion = null;

  function showMemorizeQuestion() {
    clearTimeout(nextTimer);
    window.removeEventListener("keydown", handleEnterNext);
    quizSelectCard.style.display = "none";

    const baseColor = originalQuiz.subjectColor || null;
    const activePool = quiz.questions.filter(q => memorizeSuccessLogs[q.originalIdx] < 3);

    if(activePool.length === 0) {
      showMemorizeClearScreen();
      return;
    }

    let totalWeight = 0;
    const itemsWithWeight = activePool.map(q => {
      const successCount = memorizeSuccessLogs[q.originalIdx];
      let weight = 100;
      if (successCount === 1) weight = 50;
      if (successCount === 2) weight = 25;
      totalWeight += weight;
      return { q, weight };
    });

    let randomWeight = Math.random() * totalWeight;
    currentMemorizeQuestion = activePool[0]; 

    for (let item of itemsWithWeight) { randomWeight -= item.weight; if (randomWeight <= 0) { currentMemorizeQuestion = item.q; break; } }

    const currentSuccess = memorizeSuccessLogs[currentMemorizeQuestion.originalIdx];
    let rankBadge = `<span class="badge" style="background:var(--rank0); color:#1e293b;">未達成</span>`;
    if(currentSuccess === 1) rankBadge = `<span class="badge" style="background:var(--rank1); color:white;">1回正解</span>`;
    if(currentSuccess === 2) rankBadge = `<span class="badge" style="background:var(--rank2); color:white;">2回正解</span>`;

    let cardCustomStyle = "";
    if(baseColor) {
      cardCustomStyle = `style="border-color: ${hexToRgba(baseColor, 0.3)}; background-color: ${hexToRgba(baseColor, 0.01)}"`;
    }

    appArea.innerHTML = `
      <div class="card" id="quizCard" ${cardCustomStyle}>
        <div class="effect-overlay" id="effectOverlay"></div>
        <div class="topbar">
          <div>暗記モード</div>
          <div>${rankBadge}</div>
        </div>
        <div style="font-size:14px; color:var(--sub); margin-top:10px;">単元: ${currentMemorizeQuestion.unit} (残りカウント対象: ${activePool.length}問)</div>
        <div class="question">${currentMemorizeQuestion.question}</div>
        <input id="answerInput" autocomplete="off" type="text" placeholder="解答を入力" ${baseColor ? `style="border-color:${hexToRgba(baseColor, 0.3)}"`:''}>
        <div class="button-row">
          <button class="main-btn" id="judgeBtn" ${baseColor ? `style="background: ${baseColor}"`:''}>判定する</button>
          <button class="danger-sub-btn" id="quitBtn">暗記セッションを終了</button>
        </div>
      </div>
    `;

    const input = appArea.querySelector("#answerInput");
    if(input) {
      setTimeout(()=>{ input.focus(); }, 20);
      input.addEventListener("keydown", e => { if(e.key === "Enter"){ checkMemorizeAnswer(); } });
      if(baseColor) {
        input.onfocus = () => input.style.borderColor = baseColor;
        input.onblur = () => input.style.borderColor = hexToRgba(baseColor, 0.3);
      }
    }
    appArea.querySelector("#judgeBtn").onclick = checkMemorizeAnswer;
    appArea.querySelector("#quitBtn").onclick = showStart;
  }

  async function checkMemorizeAnswer() {
    const input = appArea.querySelector("#answerInput");
    if(!input) return;
    const user = input.value.trim();
    if(!user) return;

    sessionAnsweredCount += 1; 

    const q = currentMemorizeQuestion;
    const original = originalQuiz.questions[q.originalIdx];
    const correct = normalize(user) === normalize(q.answer);

    if(correct) {
      memorizeSuccessLogs[q.originalIdx] = Math.min(3, memorizeSuccessLogs[q.originalIdx] + 1);
      original.stats.correct++;
      original.statsHistory.push(1);
    } else {
      memorizeSuccessLogs[q.originalIdx] = 0; 
      original.stats.wrong++;
      original.statsHistory.push(0);
    }
    if(original.statsHistory.length > 5) original.statsHistory.shift();

    originalQuiz.logs[q.originalIdx] = {
      correct: original.stats.correct,
      wrong: original.stats.wrong,
      history: original.statsHistory,
      last: new Date().toISOString()
    };

    try {
      await setDoc(doc(db, "quizzes", quizDocId), originalQuiz);
    } catch(e) {
      console.error(e);
    }

    const card = appArea.querySelector("#quizCard");
    const overlay = appArea.querySelector("#effectOverlay");
    if(correct) {
      overlay.textContent = "○"; overlay.style.color = "var(--good)"; overlay.classList.add("animate-ok");
    } else {
      overlay.textContent = "×"; overlay.style.color = "var(--bad)"; overlay.classList.add("animate-ng"); card.classList.add("shake");
    }

    setTimeout(() => { showMemorizeJudge(correct, q.answer); }, 600);
  }

  function showMemorizeJudge(correct, answer) {
    const baseColor = originalQuiz.subjectColor || null;
    appArea.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 class="${correct ? 'good':'bad'}" style="font-size: 40px; margin: 10px 0;">${correct ? '正解':'不正解'}</h2>
        ${!correct ? `<div style="font-size:34px; margin-bottom:15px; font-weight:bold;">正解：<span class="good">${answer}</span></div>` : ''}
        ${correct ? `<div style="color:var(--sub); margin-bottom:10px; font-size:16px;">1秒後に次の問題に進みます</div>` : ''}
        
        <div style="margin: 20px 0; padding: 12px; background: rgba(0,0,0,0.02); border-radius:12px; font-size:15px;">
          現在の記憶度: <b>${memorizeSuccessLogs[currentMemorizeQuestion.originalIdx]} / 3 回正解</b><br>
          <span style="font-size:12px; color:var(--sub);">※3回正解するとこのセッションでは出題されなくなります</span>
        </div>

        <div class="button-row" style="justify-content:center;">
          <button class="main-btn" id="nextBtn" ${baseColor ? `style="background: ${baseColor}"`:''}>次へ (Enter)</button>
        </div>
      </div>
    `;

    const nextBtn = appArea.querySelector("#nextBtn");
    if(nextBtn) setTimeout(()=>{ nextBtn.focus(); }, 20);

    nextBtn.onclick = handleMemorizeNextStep;
    window.addEventListener("keydown", handleEnterNext);

    if(correct) {
      nextTimer = setTimeout(handleMemorizeNextStep, 1000);
    }
  }

  function handleMemorizeNextStep() {
    window.removeEventListener("keydown", handleEnterNext);
    clearTimeout(nextTimer);
    if(sessionAnsweredCount >= 5) {
      sessionAnsweredCount = 0; 
      showMemorizeProgressGraph();
    } else {
      showMemorizeQuestion();
    }
  }

  function showMemorizeProgressGraph() {
    window.removeEventListener("keydown", handleEnterNext);
    const baseColor = originalQuiz.subjectColor || null;
    
    let r0 = 0, r1 = 0, r2 = 0, r3 = 0;
    const totalQuestions = quiz.questions.length;

    quiz.questions.forEach(q => {
      const count = memorizeSuccessLogs[q.originalIdx] || 0;
      if (count === 0) r0++;
      if (count === 1) r1++;
      if (count === 2) r2++;
      if (count === 3) r3++;
    });

    const p0 = Math.round((r0 / totalQuestions) * 100);
    const p1 = Math.round((r1 / totalQuestions) * 100);
    const p2 = Math.round((r2 / totalQuestions) * 100);
    const p3 = Math.round((r3 / totalQuestions) * 100);

    appArea.innerHTML = `
      <div class="card" style="text-align: center;">
        <h2 style="color: var(--primary); font-size:22px; margin-bottom:10px; ${baseColor ? `color:${baseColor}`:''}">現在の暗記定着度（5問達成）</h2>
        <p style="font-size:14px; color:var(--sub);">全 ${totalQuestions} 問の現在の正解回数割合です</p>
        
        <div class="stacked-bar-container">
          ${r3 > 0 ? `<div class="stacked-segment" style="background:var(--rank3); width:${p3}%;">${p3}%</div>` : ''}
          ${r2 > 0 ? `<div class="stacked-segment" style="background:var(--rank2); width:${p2}%;">${p2}%</div>` : ''}
          ${r1 > 0 ? `<div class="stacked-segment" style="background:var(--rank1); width:${p1}%;">${p1}%</div>` : ''}
          ${r0 > 0 ? `<div class="stacked-segment" style="background:var(--rank0); width:${p0}%; color:#1e293b;">${p0}%</div>` : ''}
        </div>

        <div class="legend-container">
          <div class="legend-item"><div class="legend-color" style="background:var(--rank3)"></div> 3回完了 (緑): ${r3}問</div>
          <div class="legend-item"><div class="legend-color" style="background:var(--rank2)"></div> 2回 (黄緑): ${r2}問</div>
          <div class="legend-item"><div class="legend-color" style="background:var(--rank1)"></div> 1回 (黄色): ${r1}問</div>
          <div class="legend-item"><div class="legend-color" style="background:var(--rank0)"></div> 未達成: ${r0}問</div>
        </div>

        <div class="button-row center" style="margin-top:28px;">
          <button class="main-btn" id="continueMemorizeBtn" style="width:100%; max-width:280px; ${baseColor ? `background: ${baseColor}`:''}">暗記を続ける (Enter)</button>
        </div>
      </div>
    `;

    const btn = appArea.querySelector("#continueMemorizeBtn");
    if(btn) setTimeout(() => btn.focus(), 20);

    btn.onclick = showMemorizeQuestion;

    window.addEventListener("keydown", function graphEnter(e) {
      if(e.key === "Enter") {
        e.preventDefault();
        window.removeEventListener("keydown", graphEnter);
        showMemorizeQuestion();
      }
    });
  }

  function showMemorizeClearScreen() {
    quizSelectCard.style.display = "none";
    appArea.innerHTML = `
      <div class="card" style="text-align: center; border: 3px solid var(--rank3);">
        <h1 style="font-size: 48px; margin-bottom: 10px;">CLEAR</h1>
        <h2 style="color: var(--rank3); font-size:24px; margin-bottom:20px;">すべての問題を3回正解しました</h2>
        <p style="color:var(--sub); font-size:16px;">対象の問題がすべて暗記セッションをクリアしました。</p>
        
        <div class="stacked-bar-container">
          <div class="stacked-segment" style="background:var(--rank3); width:100%;">100% COMPLETE</div>
        </div>

        <div class="button-row center" style="margin-top:24px;">
          <button class="main-btn" id="memorizeDoneBtn" style="width:100%; max-width:240px;">メニューに戻る</button>
        </div>
      </div>
    `;
    fetchQuizList();
    appArea.querySelector("#memorizeDoneBtn").onclick = showStart;
  }

  function showQuestion(){
    clearTimeout(nextTimer);
    window.removeEventListener("keydown", handleEnterNext);
    quizSelectCard.style.display = "none";
    
    if(index >= quiz.questions.length){ showResult(); return; }

    const q = quiz.questions[index];
    const progress = Math.round((index / quiz.questions.length) * 100);
    const baseColor = originalQuiz.subjectColor || null;

    let cardCustomStyle = "";
    if(baseColor) {
      cardCustomStyle = `style="border-color: ${hexToRgba(baseColor, 0.3)}; background-color: ${hexToRgba(baseColor, 0.01)}"`;
    }

    appArea.innerHTML = `
      <div class="card" id="quizCard" ${cardCustomStyle}>
        <div class="effect-overlay" id="effectOverlay"></div>
        <div class="topbar">
          <div class="badge" ${baseColor ? `style="background:${hexToRgba(baseColor, 0.15)}; color:${baseColor}"`:''}>現在の連続正解: ${streak}</div>
        </div>
        <div class="progress"><div class="progress-inner" style="width:${progress}%; ${baseColor ? `background:${baseColor}`:''}"></div></div>
        <div style="font-size:14px; color:var(--sub); margin-bottom:4px;">単元: ${q.unit}</div>
        <div>第 ${index+1} 問 / ${quiz.questions.length}</div>
        <div class="question">${q.question}</div>
        <input id="answerInput" autocomplete="off" type="text" placeholder="解答を入力" ${baseColor ? `style="border-color:${hexToRgba(baseColor, 0.3)}"`:''}>
        <div class="button-row">
          <button class="main-btn" id="judgeBtn" ${baseColor ? `style="background: ${baseColor}"`:''}>判定する</button>
          <button class="danger-sub-btn" id="quitBtn">中断して結果へ</button>
        </div>
      </div>
    `;

    const input = appArea.querySelector("#answerInput");
    if(input) {
      setTimeout(()=>{ input.focus(); }, 20);
      input.addEventListener("keydown", e => { if(e.key === "Enter"){ checkAnswer(); } });
      if(baseColor) {
        input.onfocus = () => input.style.borderColor = baseColor;
        input.onblur = () => input.style.borderColor = hexToRgba(baseColor, 0.3);
      }
    }
    appArea.querySelector("#judgeBtn").onclick = checkAnswer;
    appArea.querySelector("#quitBtn").onclick = showResult;
  }

  async function checkAnswer(){
    const input = appArea.querySelector("#answerInput");
    if(!input) return;
    const user = input.value.trim();
    if(!user) return; 

    const q = quiz.questions[index];
    const original = originalQuiz.questions[q.originalIdx];
    const correct = normalize(user) === normalize(q.answer);

    if(correct){
      score++; streak++; original.stats.correct++; original.statsHistory.push(1);
    } else {
      streak=0; original.stats.wrong++; original.statsHistory.push(0); misses.push(q);
    }
    if(original.statsHistory.length > 5) original.statsHistory.shift();

    results.push({ question: q.question, user: user, answer: q.answer, correct });
    
    originalQuiz.logs[q.originalIdx] = {
      correct: original.stats.correct,
      wrong: original.stats.wrong,
      history: original.statsHistory,
      last: new Date().toISOString()
    };

    try {
      await setDoc(doc(db, "quizzes", quizDocId), originalQuiz);
    } catch(e) {
      console.error(e);
    }

    const card = appArea.querySelector("#quizCard");
    const overlay = appArea.querySelector("#effectOverlay");
    if(correct) {
      overlay.textContent = "○"; overlay.style.color = "var(--good)"; overlay.classList.add("animate-ok");
    } else {
      overlay.textContent = "×"; overlay.style.color = "var(--bad)"; overlay.classList.add("animate-ng"); card.classList.add("shake");
    }

    setTimeout(() => { showJudge(correct, q.answer); }, 600);
  }

  function showJudge(correct, answer){
    const baseColor = originalQuiz.subjectColor || null;
    appArea.innerHTML = `
      <div class="card" style="text-align:center;">
        <h2 class="${correct ? 'good':'bad'}" style="font-size: 40px; margin: 10px 0;">${correct ? '正解':'不正解'}</h2>
        ${!correct ? `<div style="font-size:34px; margin-bottom:15px; font-weight:bold;">正解：<span class="good">${answer}</span></div>` : ''}
        ${correct ? `<div style="color:var(--sub); margin-bottom:10px; font-size:16px;">1秒後に次の問題に進みます</div>` : ''}
        <div class="button-row" style="justify-content:center;">
          <button class="main-btn" id="nextBtn" ${baseColor ? `style="background: ${baseColor}"`:''}>次へ (Enter)</button>
          <button class="danger-sub-btn" id="exitBtn">終了</button>
        </div>
      </div>
    `;
    
    const nextBtn = appArea.querySelector("#nextBtn");
    if(nextBtn) setTimeout(()=>{ nextBtn.focus(); }, 20);
    
    appArea.querySelector("#nextBtn").onclick = nextQuestion;
    appArea.querySelector("#exitBtn").onclick = showResult;

    if(correct) nextTimer = setTimeout(nextQuestion, 1000);
    window.addEventListener("keydown", handleEnterNext);
  }

  function handleEnterNext(e){
    if(e.key === "Enter"){
      e.preventDefault();
      if(isMemorizeMode) {
        handleMemorizeNextStep();
      } else {
        nextQuestion();
      }
    }
  }

  function nextQuestion(){
    window.removeEventListener("keydown", handleEnterNext);
    clearTimeout(nextTimer);
    index++; showQuestion();
  }

  function showResult(){
    clearTimeout(nextTimer);
    window.removeEventListener("keydown", handleEnterNext);
    quizSelectCard.style.display = "none"; 

    const total = results.length;
    if(total === 0) { showStart(); return; }
    const rate = Math.round((score / total) * 100);
    const baseColor = originalQuiz.subjectColor || null;

    let detail = "";
    results.forEach((r, i)=>{
      detail += `
        <div class="result-item">
          <b>#${i+1}：</b>${r.question}<br>
          入力：${r.user} | 正解：${r.answer} 
          <span class="${r.correct ? 'good':'bad'}" style="font-weight:bold; float:right;">${r.correct ? '◯':'✕'}</span>
        </div>`;
    });

    appArea.innerHTML = `
      <div class="card">
        <h2>テスト結果</h2>
        <div class="stats">
          <div class="stat" ${baseColor ? `style="background:${hexToRgba(baseColor,0.06)}"`:''}><div>最終スコア</div><div class="stat-value">${score} / ${total}</div></div>
          <div class="stat" ${baseColor ? `style="background:${hexToRgba(baseColor,0.06)}"`:''}><div>今回の正答率</div><div class="stat-value">${rate}%</div></div>
        </div>
        <div class="progress"><div class="progress-inner" style="width:${rate}%; ${baseColor ? `background:${baseColor}`:''}"></div></div>
        <div class="button-row">
          <button class="main-btn" id="retryBtn" ${baseColor ? `style="background: ${baseColor}"`:''}>間違えた問題だけ再挑戦</button>
          <button class="sub-btn" id="backToMenuBtn" ${baseColor ? `style="border-color: ${baseColor}; color:${baseColor}"`:''}>最初に戻る</button>
        </div>
        <h2 style="margin-top:24px;">今回の解答履歴</h2>
        ${detail}
      </div>
    `;

    fetchQuizList();

    const retryBtn = appArea.querySelector("#retryBtn");
    if(retryBtn && misses.length > 0) setTimeout(()=>{ retryBtn.focus(); }, 20);

    appArea.querySelector("#retryBtn").onclick = retryMisses;
    appArea.querySelector("#backToMenuBtn").onclick = showStart;
  }

  function retryMisses(){
    if(misses.length === 0){ 
      openModal("パーフェクト", "ミスした問題はありません。"); 
      return; 
    }
    quiz = { questions: [...misses] };
    index=0; score=0; results=[]; misses=[];
    quizSelectCard.style.display = "none";
    showQuestion();
  }

  function normalize(str){
    return str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, "").trim().toLowerCase();
  }

  function openModal(title, message) {
    document.getElementById("modalTitle").textContent = title;
    document.getElementById("modalBody").textContent = message;
    document.getElementById("customModal").classList.add("active");
  }
  function hideModal() { 
    document.getElementById("customModal").classList.remove("active"); 
  }
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
</script>
</body>
</html>
